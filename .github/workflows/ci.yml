name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install coverage tooling (3.12 only)
        if: matrix.python-version == '3.12'
        run: |
          python -m pip install --upgrade pip
          python -m pip install coverage

      - name: Bytecode compile check
        run: python -m compileall -q src tests

      - name: Diagnostic test discovery breakdown
        if: matrix.python-version == '3.12'
        run: |
          python - <<'PY'
          import unittest
          from collections import Counter

          suite = unittest.defaultTestLoader.discover('tests', pattern='test_*.py')

          def iter_tests(node):
            for test in node:
              if isinstance(test, unittest.TestSuite):
                yield from iter_tests(test)
              else:
                yield test

          tests = list(iter_tests(suite))
          print(f"Discovered total tests: {len(tests)}")

          by_file = Counter(test.__class__.__module__.replace('.', '/') + '.py' for test in tests)
          for file_name in sorted(by_file):
            print(f"{by_file[file_name]:4d}  {file_name}")
          PY

      - name: Run test suite
        run: |
          # Keep conformance tests out of the regular suite: they run in dedicated
          # smoke/nightly steps below with explicit KAT settings.
          TEST_FILES=$(find tests -type f -name 'test_*.py' ! -path 'tests/conformance/*' | sort)

          if [ "${{ matrix.python-version }}" = "3.12" ]; then
            coverage run -m unittest ${TEST_FILES}
          else
            python -m unittest ${TEST_FILES}
          fi

      - name: Conformance smoke (reduced records)
        if: matrix.python-version == '3.12' && github.event_name != 'schedule'
        run: |
          LIBPQC_KAT_MAX_RECORDS=2 LIBPQC_KAT_PROGRESS=1 LIBPQC_KAT_TIMING=1 \
          python -m unittest tests/conformance/test_ml_kem_kat.py tests/conformance/test_ml_dsa_kat.py

      - name: Conformance full-vector (nightly)
        if: matrix.python-version == '3.12' && github.event_name == 'schedule'
        run: |
          LIBPQC_KAT_MAX_RECORDS=1000 LIBPQC_KAT_REQUIRE_FULL=1 LIBPQC_KAT_PROGRESS=1 LIBPQC_KAT_TIMING=1 \
          python -m unittest tests/conformance/test_ml_kem_kat.py tests/conformance/test_ml_dsa_kat.py

      - name: Coverage summary
        if: matrix.python-version == '3.12'
        run: coverage report -m

      - name: Export coverage XML
        if: matrix.python-version == '3.12'
        run: coverage xml

      - name: Export coverage HTML
        if: matrix.python-version == '3.12'
        run: coverage html -d htmlcov

      - name: Export coverage JSON
        if: matrix.python-version == '3.12'
        run: coverage json

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py312
          path: |
            coverage.xml
            coverage.json
            htmlcov

  smoke:
    name: Smoke (entrypoint)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scratch entrypoint
        run: python scratch.py

  dependency-review:
    name: Dependency Review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  publish-coverage:
    name: Update Coverage Folder
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download coverage artifact from tests
        uses: actions/download-artifact@v4
        with:
          name: coverage-py312
          path: coverage_artifact

      - name: Stage coverage files
        run: |
          mkdir -p coverage
          cp coverage_artifact/coverage.xml coverage/coverage.xml
          cp coverage_artifact/coverage.json coverage/coverage.json

      - name: Build coverage badge and summary
        run: |
          python scripts/update_coverage_assets.py

      - name: Commit coverage folder to current branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A coverage
          if git diff --cached --quiet; then
            echo "No coverage changes to commit"
            exit 0
          fi
          git commit -m "chore(ci): update coverage report [skip ci]"
          git push

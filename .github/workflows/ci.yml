name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install coverage

      - name: Bytecode compile check
        run: python -m compileall -q src tests

      - name: Run unit tests with coverage
        run: python -m coverage run -m unittest discover -s tests -p 'test_*.py'

      - name: Coverage summary
        run: python -m coverage report -m

      - name: Export coverage XML
        run: python -m coverage xml

      - name: Export coverage HTML
        run: python -m coverage html -d htmlcov

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov

  smoke:
    name: Smoke (entrypoint)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scratch entrypoint
        run: python scratch.py

  dependency-review:
    name: Dependency Review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  publish-coverage:
    name: Update Coverage Folder
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install coverage

      - name: Generate coverage files
        run: |
          python -m coverage run -m unittest discover -s tests -p 'test_*.py'
          python -m coverage html -d coverage/html
          python -m coverage xml -o coverage/coverage.xml
          python -m coverage json -o coverage/coverage.json

      - name: Build coverage badge and summary
        run: |
          python scripts/update_coverage_assets.py

      - name: Commit coverage folder to current branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Force-add because repository/global ignore rules and coverage.py's
          # generated coverage/html/.gitignore can otherwise block report files.
          git add -A -f coverage
          if git diff --cached --quiet; then
            echo "No coverage changes to commit"
            exit 0
          fi
          git commit -m "chore(ci): update coverage report [skip ci]"
          git push
